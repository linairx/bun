# Fork 用户自编译 Workflow
# 在你自己的 fork 上运行此 workflow 来编译 Bun
#
# 使用方法:
# 1. Fork 这个仓库到你的 GitHub 账号
# 2. 进入 Actions 标签页
# 3. 选择 "Build Bun (Fork)" workflow
# 4. 点击 "Run workflow" 选择你的分支
# 5. 等待编译完成（约 60-120 分钟）
# 6. 在 Artifacts 中下载编译好的二进制文件

name: Build Bun (Fork)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

concurrency:
  group: build-fork-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/oven-sh/bun-development-docker-image:latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: |
            ccache-linux-

      - name: Fix git ownership
        run: git config --global --add safe.directory /__w/bun/bun

      - name: Install dependencies
        run: bun install

      - name: Build
        run: |
          # Set cache path for ccache
          export CACHE_PATH="$HOME/.cache/ccache"
          export CCACHE_DIR="$HOME/.cache/ccache"
          mkdir -p "$CCACHE_DIR"

          if [ "${{ inputs.build_type }}" = "debug" ]; then
            bun run build:debug
          else
            bun run build:release
          fi

          # Show ccache stats
          ccache --show-stats 2>/dev/null || true

      - name: Verify build
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            ls -la build/debug/bun-debug
            ./build/debug/bun-debug --version
          else
            ls -la build/release/bun
            ./build/release/bun --version
          fi

      - name: Package artifact
        run: |
          mkdir -p artifact
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            cp build/debug/bun-debug artifact/bun-debug-linux-x64
          else
            cp build/release/bun artifact/bun-linux-x64
          fi
          chmod +x artifact/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-linux-${{ inputs.build_type }}-${{ github.sha }}
          path: artifact/
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: |
            ccache-macos-

      - name: Install system dependencies
        run: |
          brew install cmake ninja pkg-config openssl zlib ccache

      - name: Setup LLVM
        run: |
          # 使用 LLVM 19 而不是 21，避免 libc++ lazy_split_view.h 的 bug
          brew install llvm@19 || brew install llvm@18 || brew install llvm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install

      - name: Setup LLVM environment
        run: |
          # Setup LLVM paths before any CMake configuration
          LLVM_PATH=""
          if [ -d "$(brew --prefix llvm@19 2>/dev/null)/bin" ]; then
            LLVM_PATH="$(brew --prefix llvm@19)/bin"
          elif [ -d "$(brew --prefix llvm@18 2>/dev/null)/bin" ]; then
            LLVM_PATH="$(brew --prefix llvm@18)/bin"
          else
            LLVM_PATH="$(brew --prefix llvm)/bin"
          fi
          echo "LLVM_PATH=$LLVM_PATH" >> $GITHUB_ENV
          echo "$LLVM_PATH" >> $GITHUB_PATH

          # Verify clang is available
          echo "Using LLVM from: $LLVM_PATH"
          "$LLVM_PATH/clang" --version

      - name: Clear CMake cache
        run: |
          # Clear entire build directory to avoid cached NOTFOUND compiler paths
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            rm -rf build/debug
          else
            rm -rf build/release
          fi

      - name: Build
        run: |
          # Set cache path for ccache
          export CACHE_PATH="$HOME/Library/Caches/ccache"
          export CCACHE_DIR="$HOME/Library/Caches/ccache"
          mkdir -p "$CCACHE_DIR"

          if [ "${{ inputs.build_type }}" = "debug" ]; then
            bun run build:debug
          else
            bun run build:release
          fi

          # Show ccache stats
          ccache --show-stats 2>/dev/null || true

      - name: Verify build
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            ls -la build/debug/bun-debug
            ./build/debug/bun-debug --version
          else
            ls -la build/release/bun
            ./build/release/bun --version
          fi

      - name: Package artifact
        run: |
          mkdir -p artifact
          ARCH=$(uname -m)
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            cp build/debug/bun-debug artifact/bun-debug-macos-${ARCH}
          else
            cp build/release/bun artifact/bun-macos-${ARCH}
          fi
          chmod +x artifact/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-macos-${{ inputs.build_type }}-${{ github.sha }}
          path: artifact/
          retention-days: 7
